<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Three-Board Revision Handbook Skill Intro Animation</title>
  <style>
    html,
    body,
    #root {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #080b10;
      font-family: -apple-system, "SF Pro Text", Inter, -apple-system, "SF Pro Text", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    .stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      color: #f8faf7;
      background:
        radial-gradient(circle at 18% 14%, rgba(26, 94, 118, 0.28), transparent 26%),
        radial-gradient(circle at 78% 20%, rgba(190, 71, 80, 0.22), transparent 24%),
        linear-gradient(135deg, #091018 0%, #111926 52%, #0f1319 100%);
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, black 12%, black 82%, transparent);
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.13;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 1px, transparent 1px, transparent 4px);
      pointer-events: none;
    }

    .scene {
      position: absolute;
      inset: 0;
      padding: 88px 110px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: #9ed9d1;
      font-size: 24px;
      font-weight: 720;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .kicker::before {
      content: "";
      width: 48px;
      height: 2px;
      background: #d89b33;
      display: block;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .headline {
      margin-top: 34px;
      max-width: 1280px;
      font-size: 78px;
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 820;
      color: #ffffff;
    }

    .lead {
      margin-top: 30px;
      max-width: 820px;
      font-size: 30px;
      line-height: 1.55;
      color: rgba(246, 248, 244, 0.78);
    }

    .provider-headline {
      max-width: 1120px;
      font-size: 66px;
      line-height: 1.08;
    }

    .provider-lead {
      margin-top: 22px;
      max-width: 1080px;
      font-size: 26px;
      line-height: 1.45;
    }

    .hero-board-row {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 116px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    .board-card {
      min-height: 250px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 26px 80px rgba(0,0,0,0.32);
      padding: 34px;
      position: relative;
      overflow: hidden;
    }

    .board-card::after {
      content: "";
      position: absolute;
      left: 34px;
      right: 34px;
      top: 28px;
      height: 5px;
      background: var(--accent);
    }

    .board-card strong {
      display: block;
      margin-top: 34px;
      font-size: 40px;
      line-height: 1.1;
      color: #fff;
    }

    .board-card span {
      display: block;
      margin-top: 16px;
      font-size: 24px;
      line-height: 1.35;
      color: rgba(246, 248, 244, 0.72);
    }

    .board-card .status {
      position: absolute;
      right: 28px;
      bottom: 26px;
      font-size: 18px;
      font-weight: 800;
      color: #091018;
      background: var(--accent);
      padding: 10px 14px;
      border-radius: 0;
    }

    .orbit {
      position: absolute;
      right: 96px;
      top: 96px;
      width: 410px;
      height: 410px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      opacity: 0.72;
    }

    .orbit::before,
    .orbit::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      inset: 54px;
    }

    .orbit::after {
      inset: 116px;
      background: radial-gradient(circle, rgba(216,155,51,0.5), transparent 62%);
    }

    .choice-grid {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 104px;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 42px;
      align-items: stretch;
    }

    .control-panel {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(8, 12, 18, 0.72);
      padding: 32px;
      display: grid;
      gap: 18px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.36);
    }

    .choice-row {
      min-height: 78px;
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 26px;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 18px 20px;
      background: rgba(255,255,255,0.055);
    }

    .choice-row b {
      color: #e4ba68;
      font-size: 22px;
      font-family: "Consolas", "SFMono-Regular", monospace;
    }

    .choice-row span {
      color: rgba(255,255,255,0.84);
      font-size: 25px;
      line-height: 1.35;
    }

    .source-stack {
      position: relative;
      min-height: 484px;
      border: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.045));
      overflow: hidden;
      padding: 34px;
    }

    .source-card {
      position: absolute;
      width: 560px;
      height: 320px;
      padding: 24px;
      background: #f6f5ef;
      color: #162234;
      box-shadow: 0 28px 65px rgba(0,0,0,0.32);
      border: 1px solid rgba(0,0,0,0.12);
    }

    .source-card h3 {
      font-size: 28px;
      color: #172b44;
    }

    .fake-lines {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .fake-lines i {
      display: block;
      height: 12px;
      background: #d9ded9;
    }

    .fake-lines i:nth-child(2) { width: 76%; background: #be4750; }
    .fake-lines i:nth-child(3) { width: 88%; }
    .fake-lines i:nth-child(4) { width: 62%; background: #d89b33; }

    .provider-system {
      position: absolute;
      left: 110px;
      right: 110px;
      top: 470px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .provider-column {
      min-height: 430px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.075);
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .provider-column .tag {
      display: inline-flex;
      color: #101721;
      background: var(--accent);
      font-weight: 850;
      padding: 10px 14px;
      font-size: 18px;
    }

    .provider-column h3 {
      margin-top: 26px;
      font-size: 36px;
      color: white;
      line-height: 1.1;
    }

    .provider-column ul {
      margin: 26px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 18px;
      color: rgba(255,255,255,0.78);
      font-size: 22px;
      line-height: 1.38;
    }

    .provider-column li {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 14px;
    }

    .provider-column li::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 11px;
      background: var(--accent);
    }

    .sample-scene {
      display: grid;
      grid-template-columns: 0.86fr 1.14fr;
      gap: 48px;
      align-items: center;
      height: 100%;
    }

    .sample-copy {
      padding-top: 0;
    }

    .sample-headline {
      max-width: 680px;
      font-size: 66px;
      line-height: 1.06;
    }

    .route-headline {
      max-width: 1240px;
      font-size: 64px;
      line-height: 1.06;
    }

    .stat-list {
      margin-top: 30px;
      display: grid;
      gap: 12px;
      max-width: 620px;
    }

    .stat {
      display: grid;
      grid-template-columns: 112px 1fr;
      align-items: baseline;
      gap: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.13);
      padding-bottom: 12px;
    }

    .stat b {
      color: #e4ba68;
      font-size: 42px;
      line-height: 1;
    }

    .stat span {
      color: rgba(255,255,255,0.74);
      font-size: 21px;
      line-height: 1.3;
    }

    .screenshot-wall {
      position: relative;
      height: 760px;
    }

    .shot {
      position: absolute;
      width: 720px;
      border: 10px solid #f7f6f1;
      box-shadow: 0 34px 90px rgba(0,0,0,0.43);
      background: #fff;
    }

    .shot img {
      display: block;
      width: 100%;
      height: auto;
    }

    .visual-routing {
      position: absolute;
      left: 110px;
      right: 110px;
      top: 430px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 28px;
    }

    .route-card {
      min-height: 390px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.078);
      padding: 28px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    .route-card h3 {
      font-size: 31px;
      color: white;
    }

    .route-visual {
      display: grid;
      align-items: center;
      justify-items: center;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(4,8,12,0.36);
      min-height: 210px;
    }

    .route-card p {
      color: rgba(255,255,255,0.76);
      font-size: 24px;
      line-height: 1.38;
    }

    .svg-diagram {
      width: 238px;
      height: 142px;
      position: relative;
    }

    .svg-diagram::before {
      content: "";
      position: absolute;
      inset: 14px 20px;
      border-left: 5px solid #f7f6f1;
      border-bottom: 5px solid #f7f6f1;
    }

    .svg-diagram span {
      position: absolute;
      bottom: 26px;
      width: 36px;
      background: #d89b33;
    }

    .svg-diagram span:nth-child(1) { left: 54px; height: 42px; }
    .svg-diagram span:nth-child(2) { left: 104px; height: 74px; background: #4fa394; }
    .svg-diagram span:nth-child(3) { left: 154px; height: 104px; background: #be4750; }

    .queue-lines {
      width: 290px;
      display: grid;
      gap: 14px;
    }

    .queue-lines i {
      height: 18px;
      background: rgba(255,255,255,0.22);
    }

    .queue-lines i:nth-child(1) { width: 92%; background: #d89b33; }
    .queue-lines i:nth-child(2) { width: 72%; }
    .queue-lines i:nth-child(3) { width: 100%; background: #4fa394; }
    .queue-lines i:nth-child(4) { width: 58%; }

    .model-grid {
      display: grid;
      gap: 12px;
      width: 300px;
    }

    .model-grid span {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 22px;
      padding: 14px;
      text-align: center;
    }

    .origin-layout {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 104px;
      display: grid;
      grid-template-columns: 0.78fr 1.22fr;
      gap: 34px;
      align-items: stretch;
    }

    .quote-panel {
      min-height: 330px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(216,155,51,0.12);
      padding: 42px;
      display: grid;
      align-content: center;
      gap: 18px;
      box-shadow: 0 28px 80px rgba(0,0,0,0.32);
    }

    .quote-panel strong {
      color: #fff;
      font-size: 52px;
      line-height: 1.05;
    }

    .quote-panel span {
      color: rgba(255,255,255,0.78);
      font-size: 30px;
      line-height: 1.35;
    }

    .story-points,
    .usage-steps,
    .pipeline-board,
    .style-grid,
    .quality-grid {
      display: grid;
      gap: 20px;
    }

    .story-points {
      grid-template-columns: repeat(3, 1fr);
    }

    .story-points article,
    .usage-steps article,
    .pipeline-step,
    .style-card,
    .quality-card {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.075);
      padding: 28px;
      box-shadow: 0 22px 70px rgba(0,0,0,0.24);
    }

    .story-points b,
    .pipeline-step b,
    .quality-card b {
      color: #e4ba68;
      font-size: 23px;
      font-family: "Consolas", "SFMono-Regular", monospace;
    }

    .story-points p,
    .usage-steps p,
    .pipeline-step p,
    .style-card p,
    .quality-card span {
      margin-top: 16px;
      color: rgba(255,255,255,0.76);
      font-size: 24px;
      line-height: 1.4;
    }

    .usage-steps {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 110px;
      grid-template-columns: repeat(4, 1fr);
    }

    .usage-steps article {
      min-height: 300px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 18px;
    }

    .usage-steps article div {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      background: #d89b33;
      color: #091018;
      font-weight: 900;
      font-family: "Consolas", "SFMono-Regular", monospace;
    }

    .usage-steps h3,
    .pipeline-step h3,
    .style-card h3 {
      color: #fff;
      font-size: 31px;
      line-height: 1.18;
    }

    .pipeline-board {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 106px;
      grid-template-columns: repeat(5, 1fr);
    }

    .pipeline-step {
      min-height: 270px;
      position: relative;
      overflow: hidden;
    }

    .pipeline-step::after {
      content: "";
      position: absolute;
      right: -34px;
      top: 50%;
      width: 68px;
      height: 3px;
      background: rgba(216,155,51,0.62);
    }

    .pipeline-step:last-child::after {
      display: none;
    }

    .style-grid {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 108px;
      grid-template-columns: repeat(4, 1fr);
    }

    .style-card {
      min-height: 286px;
      border-top: 6px solid #4fa394;
    }

    .quality-grid {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 122px;
      grid-template-columns: repeat(4, 1fr);
    }

    .quality-card {
      min-height: 250px;
      display: grid;
      align-content: center;
      gap: 14px;
      background: rgba(8, 12, 18, 0.72);
    }

    .quality-card i {
      display: block;
      height: 10px;
      width: 84%;
      background: linear-gradient(90deg, #4fa394, #d89b33);
    }

    .final-lockup {
      position: absolute;
      left: 110px;
      right: 110px;
      top: 170px;
      display: grid;
      grid-template-columns: 1fr 0.82fr;
      gap: 54px;
      align-items: center;
    }

    .deliverable {
      border: 1px solid rgba(255,255,255,0.16);
      background: #f7f6f1;
      min-height: 600px;
      color: #172234;
      padding: 42px;
      box-shadow: 0 36px 100px rgba(0,0,0,0.36);
      transform: rotate(-1.5deg);
    }

    .deliverable h3 {
      font-size: 36px;
      color: #172234;
    }

    .deliverable .bar {
      height: 10px;
      width: 84%;
      background: #be4750;
      margin-top: 28px;
    }

    .deliverable .paper-grid {
      margin-top: 34px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .paper-box {
      min-height: 132px;
      border: 1px solid #d4d9d2;
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .paper-box b {
      color: #17324d;
      font-size: 20px;
    }

    .paper-box i {
      display: block;
      height: 9px;
      background: #d9ded9;
    }

    .paper-box i:nth-child(3) {
      width: 72%;
      background: #d89b33;
    }

    .footer-mark {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 42px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255,255,255,0.48);
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .progress-line {
      width: 520px;
      height: 3px;
      background: rgba(255,255,255,0.15);
      overflow: hidden;
    }

    .progress-line span {
      display: block;
      height: 100%;
      width: var(--p);
      background: #d89b33;
    }
  </style>
</head>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">

/* BEGIN USAGE */
// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Exports (to window): Stage, Sprite, PlaybackBar, TextSprite, ImageSprite, RectSprite,
//   useTime, useTimeline, useSprite, Easing, interpolate, animate, clamp.
//
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// <Stage> auto-scales to the viewport and provides the scrubber, play/pause,
// ←/→ seek, space, and 0-to-reset controls, and persists the playhead.
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook. Use Easing + interpolate()/animate()
// for tweens; TextSprite / ImageSprite / RectSprite have built-in entry/exit.
// Build YOUR scenes by composing Sprites inside a Stage.
//
// Export: a Stage is recordable to a real .mp4 by gen-video (see the
// export-as-video built-in skill). Loading the page with ?capture (or passing
// <Stage capture>) strips the scrubber/letterboxing and renders one exact frame
// per seek, and the Stage registers a stable window.__animStage bridge
// (setTime/setPlaying/duration/...) that the exporter drives frame-by-frame.
/* END USAGE */
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;

// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });

    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}

  );

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.

function TextSprite({

  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,

  letterSpacing = '-0.01em',

    opacity = t;
    ty = (1 - t) * 16;

      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,

      left: x, top: y,

function RectSprite({

  color = '#111',

  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);

    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));

    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,

      willChange: 'transform, opacity',

  const drift = interpolate([0, TOTAL_DURATION], [0, -150], Easing.linear)(time);
  return (
    <div className="stage">
      <div className="grid-lines" style={{ transform: `translate3d(${drift}px, ${drift * 0.35}px, 0)` }}></div>
      <div className="noise"></div>
    </div>
  );
}

function SceneFrame({ start, end, children }) {
  const motion = useSceneMotion(start, end);
  return (
    <Sprite start={start} end={end} keepMounted={true}>
      <section className="scene" style={motion}>
        {children}
      </section>
    </Sprite>
  );
}

function IntroScene() {
  const time = useTime();
  const cardLift = (index) => {
    const p = clamp((time - 1.2 - index * 0.22) / 0.75, 0, 1);
    return {
      opacity: Easing.easeOutCubic(p),
      transform: `translateY(${(1 - Easing.easeOutBack(p)) * 72}px)`,
      "--accent": boardData[index].accent,
    };
  };
  const orbit = interpolate([0, 5.0], [0, 38], Easing.easeInOutSine)(time);
  return (
    <SceneFrame start={0} end={5.2}>
      <div className="orbit" style={{ transform: `rotate(${orbit}deg) scale(${1 + Math.sin(time * 0.7) * 0.025})` }}></div>
      <div className="kicker">v0.2.16 · Three-Board Support</div>
      <h1 className="headline">Three common international exam boards now run in one workflow.</h1>
      <p className="lead">
        AQA, Edexcel, and CAIE share one handbook framework, while each provider reads the syllabus from its own official source.
      </p>
      <div className="hero-board-row">
        {boardData.map((board, index) => (
          <article className="board-card" key={board.name} style={cardLift(index)}>
            <strong>{board.name}</strong>
            <span>{board.note}</span>
            <div className="status">{board.status}</div>
          </article>
        ))}
      </div>
    </SceneFrame>
  );
}

function OriginScene() {
  const time = useTime();
  const notes = [
    ["Real origin", "A student moved from Chinese-medium classes into English-medium international courses before the exam year."],
    ["What AI helps with", "It does not study for the child; it turns topics, examples, visuals, and checkpoints into readable pages."],
    ["Open-source goal", "Package the method as a Skill so other families and agents can generate subject handbooks too."],
  ];
  return (
    <SceneFrame start={4.8} end={9.7}>
      <div className="kicker">Why This Skill Exists</div>
      <h2 className="headline provider-headline">It started by making exam revision feel smaller for one real student.</h2>
      <div className="origin-layout">
        <div className="quote-panel">
          <strong>Not replacing study,</strong>
          <span>but reducing the noise around it.</span>
        </div>
        <div className="story-points">
          {notes.map((note, index) => {
            const p = clamp((time - 5.4 - index * 0.22) / 0.65, 0, 1);
            return (
              <article key={note[0]} style={{ opacity: p, transform: `translateY(${(1 - p) * 34}px)` }}>
                <b>{note[0]}</b>
                <p>{note[1]}</p>
              </article>
            );
          })}
        </div>
      </div>
    </SceneFrame>
  );
}

function ClosingScene() {

  const p = clamp((time - 46.0) / 1.0, 0, 1);

  return (
    <SceneFrame start={45.8} end={TOTAL_DURATION}>
      <div className="final-lockup">

function Footer() {
  const time = useTime();
  const p = `${Math.min(100, (time / TOTAL_DURATION) * 100)}%`;
  return (
    <div className="footer-mark">
      <span>IGCSE & A-Level AI Revision Handbook Skill · v0.2.16</span>
      <div className="progress-line" style={{ "--p": p }}><span></span></div>
      <span>{Math.floor(time).toString().padStart(2, "0")} / {TOTAL_DURATION}s</span>
    </div>
  );
}

function App() {
  return (
    <Stage width={1920} height={1080} duration={TOTAL_DURATION} background="#080b10">

      <OriginScene />
      <UsageScene />
      <PreflightScene />
      <ProviderScene />

      <LanguageStyleScene />
      <VisualRouteScene />

      <Footer />

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
